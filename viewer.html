<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>through the years</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --line:#283040; --txt:#e6edf3; --muted:#8b949e; --accent:#22c55e; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  body { display:flex; flex-direction:column; height:100vh; overflow:hidden; }

  header { display:flex; align-items:baseline; gap:12px; padding:14px 20px; border-bottom:1px solid var(--line); }
  header h1 { font-size:15px; font-weight:600; margin:0; letter-spacing:.2px; }
  header .sub { font-size:12px; color:var(--muted); }
  header .spacer { flex:1; }
  header a { color:var(--muted); font-size:12px; text-decoration:none; border:1px solid var(--line);
    padding:4px 10px; border-radius:6px; }
  header a:hover { color:var(--txt); border-color:var(--muted); }
  header a.home { margin-right:2px; }

  .stage { position:relative; flex:1; display:flex; align-items:center; justify-content:center;
    padding:24px; min-height:0; background:
      radial-gradient(1200px 600px at 50% -10%, #11161f 0%, var(--bg) 60%); }
  .frame { position:relative; max-width:100%; max-height:100%; }
  .frame img { display:block; max-width:100%; max-height:78vh; border-radius:8px;
    box-shadow:0 20px 60px rgba(0,0,0,.55); border:1px solid var(--line); background:#fff; }

  /* date overlay */
  .badge { position:absolute; right:14px; bottom:14px; background:rgba(13,17,23,.78);
    backdrop-filter:blur(6px); border:1px solid var(--line); border-radius:10px; padding:10px 14px;
    text-align:right; line-height:1.1; }
  .badge .year { font-size:30px; font-weight:700; letter-spacing:.5px; }
  .badge .date { font-size:12px; color:var(--muted); margin-top:3px; font-variant-numeric:tabular-nums; }

  /* nav arrows */
  .nav { position:absolute; top:50%; transform:translateY(-50%); width:46px; height:46px; border-radius:50%;
    border:1px solid var(--line); background:rgba(22,27,34,.7); color:var(--txt); font-size:20px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; user-select:none; }
  .nav:hover { background:var(--panel); border-color:var(--muted); }
  .nav:disabled { opacity:.3; cursor:default; }
  .nav.prev { left:18px; } .nav.next { right:18px; }

  footer { border-top:1px solid var(--line); padding:12px 20px 16px; }
  .controls { display:flex; align-items:center; gap:14px; margin-bottom:10px; }
  .btn { border:1px solid var(--line); background:var(--panel); color:var(--txt); border-radius:7px;
    padding:6px 12px; font-size:13px; cursor:pointer; }
  .btn:hover { border-color:var(--muted); }
  .btn.play { min-width:96px; }
  .counter { font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .hint { font-size:12px; color:var(--muted); margin-left:auto; }

  .scrub { position:relative; }
  input[type=range] { width:100%; accent-color:var(--accent); cursor:pointer; }
  .ticks { display:flex; justify-content:space-between; margin-top:4px; }
  .ticks span { font-size:10px; color:var(--muted); }

  .msg { margin:auto; color:var(--muted); font-size:14px; text-align:center; }
  .msg a { color:var(--accent); }
</style>
</head>
<body>
  <header>
    <a class="home" href="./">← all sites</a>
    <h1 id="title">—</h1>
    <span class="sub" id="span">—</span>
    <span class="spacer"></span>
    <a id="source" href="https://web.archive.org/" target="_blank" rel="noopener">source: Wayback Machine</a>
  </header>

  <div class="stage">
    <button class="nav prev" id="prev" aria-label="Previous">‹</button>
    <div class="frame">
      <img id="shot" alt="">
      <div class="badge">
        <div class="year" id="year">—</div>
        <div class="date" id="date">—</div>
      </div>
    </div>
    <button class="nav next" id="next" aria-label="Next">›</button>
  </div>

  <footer>
    <div class="controls">
      <button class="btn play" id="play">▶ Play</button>
      <span class="counter" id="counter">— / —</span>
      <span class="hint">← → to step · Space to play/pause · Home/End to jump</span>
    </div>
    <div class="scrub">
      <input type="range" id="range" min="0" value="0" step="1">
      <div class="ticks" id="ticks"></div>
    </div>
  </footer>

<script>
const params = new URLSearchParams(location.search);
const SITE = params.get('site') || 'goshippo';
const BASE = 'sites/' + SITE + '/';

let SHOTS = [], DOMAIN = '', NAME = '';
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const img = document.getElementById('shot');
const yearEl = document.getElementById('year');
const dateEl = document.getElementById('date');
const counter = document.getElementById('counter');
const range = document.getElementById('range');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');
const playBtn = document.getElementById('play');
const ticks = document.getElementById('ticks');
const spanEl = document.getElementById('span');
const titleEl = document.getElementById('title');
const sourceEl = document.getElementById('source');

let i = 0, timer = null;

function preload(n){ if(n>=0 && n<SHOTS.length){ const im=new Image(); im.src=BASE+'shots/'+SHOTS[n]+'.png'; } }

function show(n){
  i = Math.max(0, Math.min(SHOTS.length-1, n));
  const d = SHOTS[i];
  const [y,m,day] = d.split('-');
  const q = Math.floor((parseInt(m)-1)/3)+1;
  img.src = BASE+'shots/'+d+'.png';
  img.alt = DOMAIN+' homepage on '+d;
  yearEl.textContent = y;
  dateEl.textContent = 'Q'+q+' · '+MONTHS[parseInt(m)-1]+' '+parseInt(day)+', '+y;
  counter.textContent = (i+1)+' / '+SHOTS.length;
  range.value = i;
  prevBtn.disabled = i===0;
  nextBtn.disabled = i===SHOTS.length-1;
  preload(i+1); preload(i-1);
}
function step(d){ if(d>0 && i===SHOTS.length-1){ stop(); return;} show(i+d); }

function play(){ if(i===SHOTS.length-1) show(0); timer=setInterval(()=>step(1),1200); playBtn.textContent='❚❚ Pause'; }
function stop(){ clearInterval(timer); timer=null; playBtn.textContent='▶ Play'; }
function toggle(){ timer?stop():play(); }

prevBtn.onclick=()=>{stop();step(-1);};
nextBtn.onclick=()=>{stop();step(1);};
playBtn.onclick=toggle;
range.oninput=()=>{stop();show(parseInt(range.value));};
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'){stop();step(1);}
  else if(e.key==='ArrowLeft'){stop();step(-1);}
  else if(e.key===' '){e.preventDefault();toggle();}
  else if(e.key==='Home'){stop();show(0);}
  else if(e.key==='End'){stop();show(SHOTS.length-1);}
});

function init(){
  document.documentElement.style.setProperty('--accent', DATA_ACCENT || '#22c55e');
  document.title = DOMAIN + ' through the years';
  titleEl.innerHTML = DOMAIN + ' <span style="color:var(--accent)">through the years</span>';
  sourceEl.href = 'https://web.archive.org/web/*/' + DOMAIN;
  range.max = SHOTS.length-1;
  const years=[...new Set(SHOTS.map(d=>d.slice(0,4)))];
  ticks.innerHTML = years.map(y=>'<span>'+y+'</span>').join('');
  spanEl.textContent = SHOTS[0]+'  →  '+SHOTS[SHOTS.length-1]+'  ·  '+SHOTS.length+' snapshots';
  show(0);
}

let DATA_ACCENT = '';
fetch(BASE+'snapshots.json')
  .then(r=>{ if(!r.ok) throw new Error('no data'); return r.json(); })
  .then(data=>{
    SHOTS = data.shots || [];
    DOMAIN = data.domain || SITE;
    NAME = data.name || SITE;
    DATA_ACCENT = data.accent || '';
    if(!SHOTS.length) throw new Error('empty');
    init();
  })
  .catch(()=>{
    document.querySelector('.stage').innerHTML =
      '<div class="msg">No snapshots found for <b>'+SITE+'</b>.<br><a href="./">← back to all sites</a></div>';
    document.querySelector('footer').style.display='none';
  });
</script>
</body>
</html>
